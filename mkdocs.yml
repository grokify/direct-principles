site_name: DIRECT Principles
site_description: Design principles for Agent Experience (AX)
site_url: https://grokify.github.io/direct-principles/
repo_url: https://github.com/grokify/direct-principles
repo_name: grokify/direct-principles

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Principles:
    - Overview: principles/index.md
    - Deterministic: principles/deterministic.md
    - Introspectable: principles/introspectable.md
    - Recoverable: principles/recoverable.md
    - Explicit: principles/explicit.md
    - Consistent: principles/consistent.md
    - Testable: principles/testable.md
  - Compliance:
    - Levels: compliance/levels.md
  - Presentations:
    - DIRECT Overview: presentations/direct-overview.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/direct-principles
